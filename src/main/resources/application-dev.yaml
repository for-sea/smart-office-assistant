server:
  port: 8791
  servlet:
    context-path: /smart-office
  tomcat:
    max-http-form-post-size: 50MB          # 表单提交最大大小
    max-connections: 200                    # 最大连接数
    threads:
      max: 200                              # 最大工作线程数
      min-spare: 10                         # 最小空闲线程数

spring:
  # AI 配置
  ai:
    ollama:
      base-url: http://localhost:11434      # Ollama 服务地址
      # 大语言模型配置
      chat:
        model: qwen3.5:9b                   # 使用的模型名称
        options:
          temperature: 0.7                  # 控制回复的随机性，值越高回复越多变
          top-p: 0.9                        # 控制回复的多样性，值越高选择范围越广
          num-predict: 2048                 # 生成文本的最大 token 数
          num-ctx: 4096                     # 上下文窗口大小，影响模型能记住的对话历史长度
          repeat-penalty: 1.1               # 重复惩罚系数，值越高越避免重复内容
      # 嵌入模型配置
      embedding:
        options:
          model: qwen3-embedding:8b         # 嵌入模型名称

  # Milvus 向量数据库配置
  vectorstore:
    milvus:
      # 连接配置
      client:
        host: localhost                     # Milvus 服务器地址
        port: 19530                         # Milvus 默认端口
        username:                           # 用户名（如启用认证）
        password:                           # 密码（如启用认证）
        connect-timeout-ms: 10000           # 客户端连接超时时间
      # 存储配置
      database-name: default                # 数据库名称
      collection-name: document_chunks      # 集合名称
      collection-description: 文档块向量集合  # 集合描述
      embedding-dimension: 4096             # 向量维度（需与嵌入模型输出维度一致）
      shards-num: 2                         # 分片数量

      # 索引配置
      index-type: IVF_FLAT                  # 索引类型
      metric-type: COSINE                   # 相似度计算方式（余弦相似度）
      index-parameters: { "nlist": 1024 }     # 索引参数

      # 字段映射配置
      id-field-name: doc_id                 # ID 字段名
      content-field-name: content           # 内容字段名
      metadata-field-name: metadata         # 元数据字段名
      embedding-field-name: embedding       # 向量字段名

      # 运行时配置
      initialize-schema: true               # 是否自动初始化 Schema（首次运行建议设为 true）
      default-top-k: 5                      # 默认返回的相似结果数量
      min-score: 0.5                        # 最低相似度阈值

  # 文件上传配置
  servlet:
    multipart:
      enabled: true                         # 启用文件上传
      max-file-size: 50MB                   # 单个文件最大大小
      max-request-size: 50MB                # 单次请求最大大小
      file-size-threshold: 2KB              # 文件写入磁盘的阈值

  # 数据库配置
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource  # 使用 Druid 连接池
    driver-class-name: com.mysql.cj.jdbc.Driver   # MySQL 驱动
    url: jdbc:mysql://localhost:3306/smart_office?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root                                # 数据库用户名
    password: xiao                                # 数据库密码
    druid:
      initial-size: 5                             # 初始连接数
      min-idle: 5                                 # 最小空闲连接数
      max-active: 20                              # 最大活跃连接数
      max-wait: 60000                             # 获取连接等待超时时间
      validation-query: SELECT 1                  # 连接验证 SQL
      test-while-idle: true                       # 空闲时是否验证连接
      time-between-eviction-runs-millis: 60000    # 空闲检测间隔
      filters: stat,wall                          # 监控统计和防火墙
      stat-view-servlet:
        enabled: true                             # 启用监控页面
        url-pattern: /druid/*                     # 监控页面访问路径
        login-username: admin                     # 监控页面登录用户名
        login-password: admin123                  # 监控页面登录密码
        allow: 127.0.0.1                          # 允许访问的 IP

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml        # Mapper XML 文件位置
  type-aliases-package: com.smart.office.entity   # 实体类包路径
  configuration:
    map-underscore-to-camel-case: true            # 开启驼峰命名映射
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl  # SQL 日志打印

# 日志配置
logging:
  level:
    org.springframework.ai: DEBUG                  # Spring AI 日志级别
    com.example.rag: DEBUG                        # RAG 模块日志级别
    org.springframework.ai.chat.client.advisor.SimpleLoggerAdvisor: DEBUG  # 简单日志适配器

# 异步任务配置
async:
  executor:
    core-pool-size: 5                             # 核心线程数
    max-pool-size: 20                             # 最大线程数
    queue-capacity: 100                           # 队列容量
    thread-name-prefix: doc-process-              # 线程名称前缀
  task:
    document:
      chunk-size: 500                             # 文本块大小（字符数）
      chunk-overlap: 100                          # 块重叠大小
      batch-size: 50                              # 批量处理大小
      max-retries: 3                              # 最大重试次数
      enable-smart-split: true                    # 启用智能分块

# 应用自定义配置
app:
  document:
    storage:
      path: ./data/docs                           # 文档存储路径
      max-file-size: 52428800                     # 最大文件大小（字节）
    processing:
      batch-size: 10                              # 批处理大小
      max-chunks: 10000                           # 最大分块数量
      chunk-timeout: 300                          # 分块处理超时时间（秒）
  auth:
    jwt:
      secret: dev-change-me-jwt-secret-at-least-32-chars  # JWT 密钥（至少32位）
      expire-seconds: 7200                        # Token 过期时间（秒）
      issuer: smart-office-dev                    # JWT 签发方
      header: Authorization                       # 请求头名称
      token-prefix: "Bearer "                     # Token 前缀
    admin:
      username: admin                             # 默认管理员账号
      password: admin123                          # 默认管理员密码
      user-id: admin                              # 默认管理员用户ID
      department: ADMIN                           # 默认管理员所属部门
      group-code: CORE                            # 默认管理员所属用户组
